name: Laravel CI/CD Pipeline with FTP Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, mysql
          coverage: xdebug

      - uses: actions/checkout@v3

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install NPM dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Create required directories
        run: mkdir -p resources/svg

      - name: Generate key
        run: php artisan key:generate

      - name: Directory Permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Execute tests (Unit and Feature tests) via PHPUnit
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: laravel_test
          DB_USERNAME: root
          DB_PASSWORD: password
        run: vendor/bin/phpunit --coverage-text --testsuite Unit

      - name: Run Laravel Pint
        run: vendor/bin/pint --test

  build-and-deploy:
    needs: laravel-tests
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, dom, fileinfo, mysql

      - name: Create required directories
        run: mkdir -p resources/svg

      # - name: Install dependencies
      #   run: composer install --no-dev --optimize-autoloader

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install NPM dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Prepare for deployment
        run: |
          cp .env.example .env
          sed -i 's/APP_ENV=local/APP_ENV=production/' .env
          sed -i "s/APP_KEY=.*/APP_KEY=${{ secrets.APP_KEY }}/" .env
          sed -i 's/APP_DEBUG=true/APP_DEBUG=false/' .env
          sed -i "s@APP_URL=.*@APP_URL=${{ secrets.APP_URL }}@" .env
          sed -i "s/DB_HOST=.*/DB_HOST=${{ secrets.DB_HOST }}/" .env
          sed -i "s/DB_PORT=.*/DB_PORT=${{ secrets.DB_PORT }}/" .env
          sed -i "s/DB_DATABASE=.*/DB_DATABASE=${{ secrets.DB_DATABASE }}/" .env
          sed -i "s/DB_USERNAME=.*/DB_USERNAME=${{ secrets.DB_USERNAME }}/" .env
          sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/" .env
          echo -e ".git/\n.github/\nnode_modules/\ntests/\n.env.example\n.gitignore" > .deploy-excludes

      - name: Add composer.phar to deployment
        run: curl -L -o composer.phar https://getcomposer.org/download/latest-stable/composer.phar

      - name: Generate post-deploy script
        run: |
          mkdir -p public
          cat > public/deploy.php << 'EOL'
          <?php
          set_time_limit(0);
          ini_set('memory_limit', '256M');

          putenv('HOME=' . dirname(__DIR__));
          putenv('COMPOSER_HOME=' . dirname(__DIR__) . '/.composer');

          chdir(dirname(__DIR__));

          header('Content-Type: text/plain');
          echo "Starting post-deployment tasks...\n";

          // Run composer install
          echo "Running composer install...\n";
          echo "This may take several minutes, please wait...\n";
          $composerCommand = 'php composer.phar install --no-dev --optimize-autoloader --no-interaction 2>&1';
          echo "Executing: $composerCommand\n";
          $composerOutput = shell_exec($composerCommand);
          echo $composerOutput . "\n";

          // Run Laravel specific commands
          echo shell_exec('php artisan optimize:clear');
          echo shell_exec('php artisan migrate --force');
          echo shell_exec('php artisan db:seed --force');
          echo shell_exec('php artisan storage:link');
          echo shell_exec('php artisan optimize');
          echo shell_exec('php artisan view:cache');
          echo shell_exec('php artisan route:cache');
          echo shell_exec('php artisan config:cache');

          echo "Post-deployment tasks completed!\n";
          EOL
          chmod +x public/deploy.php

      - name: Generate deployment package
        run: |
          mkdir -p deploy-package
          rsync -av --exclude-from='.deploy-excludes' ./ deploy-package/

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy-package/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env.example
            .deploy-excludes

      - name: Trigger Post-Deploy via HTTP
        run: curl -X GET "${{ secrets.POST_DEPLOY_URL }}"
